[custom]
;======================================================
; 基于 sr_top500_whitelist_ad.conf 白名单代理逻辑
;======================================================

; --- 自定义直连（优先于所有规则）---
ruleset=🎯 全球直连,https://sub.cclsp.top/rules/direct.list

; --- AI 平台 ---
ruleset=🌏 ChatGPT/Claude,https://sub.cclsp.top/rules/ai-platform.list

; --- 白名单直连（sr top500 可直连的境外+国内网站）---
ruleset=🎯 全球直连,https://sub.cclsp.top/rules/sr-direct.list

; --- 显式代理（在 GEOIP 之前，防止被墙的域名被错误直连）---
ruleset=🔰 节点选择,https://sub.cclsp.top/rules/social.list
ruleset=🔰 节点选择,https://sub.cclsp.top/rules/devtools.list
ruleset=🔰 节点选择,https://sub.cclsp.top/rules/gaming.list
ruleset=🔰 节点选择,https://sub.cclsp.top/rules/proxy-general.list

; --- IP 兜底直连 ---
ruleset=🎯 全球直连,[]GEOIP,CN

; --- 其余全部代理 ---
ruleset=🐟 漏网之鱼,[]FINAL

; --- 代理分组 ---
custom_proxy_group=🔰 节点选择`select`[]♻️ 自动选择`[]🎯 全球直连`^(?!.*?(流量|时间|重置|到期|剩余|过期|官网|套餐|订阅|地址|网址|更新|EXPIRE|RESET|Traffic|Remain|Website|URL|Subscription)).*$
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*?(流量|时间|重置|到期|剩余|过期|官网|套餐|订阅|地址|网址|更新|EXPIRE|RESET|Traffic|Remain|Website|URL|Subscription)).*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌏 ChatGPT/Claude`select`(美|US|USA|United States|America)`(日|JP|Japan)`^(?!.*(流量|时间|重置|到期|剩余|过期|官网|套餐|订阅|地址|网址|更新|港|HK|Hong|俄|RU|EXPIRE|RESET|Traffic|Remain|Website|URL|Subscription)).*$`[]🔰 节点选择`[]♻️ 自动选择
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🔰 节点选择`[]🎯 全球直连`[]♻️ 自动选择`^(?!.*?(流量|时间|重置|到期|剩余|过期|官网|套餐|订阅|地址|网址|更新|EXPIRE|RESET|Traffic|Remain|Website|URL|Subscription)).*$

enable_rule_generator=true
overwrite_original_rules=true
